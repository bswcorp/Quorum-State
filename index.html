<script>
async function loadRepos() {
    try {
        const res = await fetch('http://127.0.0.1:3000/api/repos');
        const data = await res.json();

        const container = document.querySelector('.left-panel .log');
        container.innerHTML = "";

        data.slice(0, 6).forEach(repo => {
            const date = new Date(repo.updated).toLocaleString();

            container.innerHTML += `
                <div>
                    <strong>${repo.name}</strong><br>
                    ⭐ ${repo.stars} | Updated: ${date}
                </div>
                <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1)">
            `;
        });

    } catch (err) {
        document.querySelector('.left-panel .log').innerHTML = "ERROR CONNECTING API";
        console.log(err);
    }
}

function loadProcessing() {
    const el = document.querySelector('.center-panel .log');
    el.innerHTML = `
        Automation Engine Running...<br>
        Active Tasks: ${Math.floor(Math.random()*5)+1}<br>
        Status: STABLE
    `;
}

function loadExecution() {
    const el = document.querySelector('.right-panel .log');
    el.innerHTML = `
        Last Execution: ${new Date().toLocaleTimeString()}<br>
        Result: SUCCESS ✔
    `;
}

// loop
setInterval(loadRepos, 5000);
setInterval(loadProcessing, 4000);
setInterval(loadExecution, 3000);

// initial load
loadRepos();
loadProcessing();
loadExecution();
</script>
